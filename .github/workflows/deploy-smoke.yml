name: deploy-smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
      FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Validate required variables
        run: |
          if [ -z "$BACKEND_BASE_URL" ]; then
            echo "Missing BACKEND_BASE_URL repository variable"
            exit 1
          fi
          if [ -z "$FRONTEND_BASE_URL" ]; then
            echo "Missing FRONTEND_BASE_URL repository variable"
            exit 1
          fi

      - name: End-to-end hosted smoke
        run: go run ./cmd/smokecheck -backend "$BACKEND_BASE_URL" -frontend "$FRONTEND_BASE_URL"
