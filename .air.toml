root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
full_bin = "./tmp/server -addr :8080"
include_ext = ["go", "mod", "sum", "yaml", "yml", "sql"]
exclude_dir = ["tmp", "web", "tests", "dist", ".git"]
delay = 300
stop_on_error = true
send_interrupt = true

[log]
time = true
